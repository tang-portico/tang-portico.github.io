<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPG 頻道轉檔工具</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- SheetJS for Excel processing -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- Jspreadsheet CE for in-browser Excel editor -->
    <script src="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4/dist/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsuites/dist/jsuites.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspreadsheet-ce/dist/jspreadsheet.min.css"
        type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsuites/dist/jsuites.min.css" type="text/css" />
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <img src="assets/PorticoMedia-Logo.svg" alt="Portico Media 杰德影音"
                    style="height: 60px; width: auto; display: block;">
            </div>
            <div class="title-area">
                <h2>頻道EPG轉檔工具 <span class="badge">beta</span></h2>
            </div>
            <div class="header-actions" style="margin-left: auto;">
                <button id="btn-settings" class="settings-btn" title="設定與更新字典">⚙️ 設定</button>
            </div>
        </header>

        <main class="main-layout">
            <!-- Left Column: Upload Zones -->
            <div class="column-left">
                <!-- Dictionary Select Section (Orange) -->
                <section class="upload-zone zone-orange dropdown-zone" id="section-dict">
                    <div class="upload-content">
                        <div class="icon-circle">📺</div>
                        <div class="text-content">
                            <h3>選擇頻道譯名資料庫</h3>
                            <p id="status-dict">請選擇欲轉換的頻道</p>
                        </div>
                    </div>

                    <div class="select-container">
                        <select id="channel-select" class="channel-dropdown">
                            <option value="">-- 請選擇頻道 --</option>
                            <option value="ROCK_Entertainment">ROCK Entertainment</option>
                            <!-- Add the other 17 channels here later -->
                        </select>
                    </div>
                </section>

                <!-- Step 1 to Step 2 Section (Blue) -->
                <section class="upload-zone zone-blue disabled" id="section-step1">
                    <div class="upload-content center-content">
                        <div class="icon-circle">+</div>
                        <h3>載入國外原檔</h3>
                        <p id="status-step1">自動轉換並下載製作與平台檔案</p>
                    </div>
                    <div class="drag-text center-drag">拖曳檔案至此或點擊上傳</div>
                    <input type="file" id="file-step1" accept=".xlsx, .xls" class="file-input" disabled>
                </section>
            </div>

            <!-- Right Column: Log Area (Green Border) -->
            <div class="column-right">
                <div class="log-container">
                    <div class="log-placeholder" id="log-placeholder">
                        <div style="text-align: center; color: #9ca3af;">
                            <div style="font-size: 3rem; margin-bottom: 1rem;">📄</div>
                            <h2 style="font-size: 1.5rem; font-weight: 500;">處理進度將顯示於此</h2>
                        </div>
                    </div>
                    <div class="log-area" id="log-step1"></div>
                    <div class="log-area" id="log-step2"></div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer style="text-align: center; padding: 2rem 0 0 0; color: #9ca3af; font-size: 0.85rem;">
            Portico Media &copy; 2026 All Rights Reserved
        </footer>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚙️ 系統設定 & 更新字典</h3>
                <button id="btn-close-settings" class="close-btn">&times;</button>
            </div>
            <div class="modal-body"
                style="display: flex; flex-direction: column; gap: 1rem; flex: 1; overflow: hidden;">
                <div class="setting-item"
                    style="flex: 1; display: flex; flex-direction: column; overflow: hidden; margin-bottom: 0;">
                    <h4>編輯 <span id="current-edit-channel" style="color: var(--blue-color);"></span> 的譯名資料庫</h4>
                    <p style="font-size: 0.9rem; color: #666; margin-bottom: 1rem; flex-shrink: 0;">
                        您可以直接像操作 Excel 一樣編輯下方的表格。支援複製貼上功能。<br>
                        編輯完成後點擊「儲存記憶」即可將新結果存入瀏覽器快取。
                    </p>

                    <div id="spreadsheet-container"
                        style="flex: 1; overflow: auto; border: 1px solid #e5e7eb; border-radius: 8px;"></div>
                </div>

                <div
                    style="display: flex; justify-content: flex-end; gap: 1rem; flex-shrink: 0; padding-top: 1rem; border-top: 1px solid #f3f4f6;">
                    <button id="btn-reset-dict" class="settings-btn"
                        style="color: #ef4444; border-color: #fca5a5; margin-right: auto;">還原預設字典</button>
                    <button id="btn-cancel-settings" class="settings-btn">取消</button>
                    <button id="btn-save-settings" class="settings-btn"
                        style="background: var(--blue-color); color: white; border-color: var(--blue-color);">儲存記憶</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
