<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPG 頻道轉檔工具</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- SheetJS for Excel processing -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <img src="assets/PorticoMedia-Logo.svg" alt="Portico Media 杰德影音"
                    style="height: 60px; width: auto; display: block;">
            </div>
            <div class="title-area">
                <h2>頻道EPG轉檔工具 <span class="badge">beta</span></h2>
            </div>
        </header>

        <main class="main-layout">
            <!-- Left Column: Upload Zones -->
            <div class="column-left">
                <!-- Dictionary Upload Section (Orange) -->
                <section class="upload-zone zone-orange" id="section-dict">
                    <div class="upload-content">
                        <div class="icon-circle">+</div>
                        <div class="text-content">
                            <h3>載入節目中文譯名資料庫</h3>
                            <p id="status-dict">請先上傳最新的翻譯資料庫</p>
                        </div>
                    </div>
                    <div class="drag-text">拖曳檔案至此或點擊上傳</div>
                    <input type="file" id="file-dict" accept=".xlsx, .xls" class="file-input">
                </section>

                <!-- Step 1 to Step 2 Section (Blue) -->
                <section class="upload-zone zone-blue disabled" id="section-step1">
                    <div class="upload-content center-content">
                        <div class="icon-circle">+</div>
                        <h3>載入國外原檔</h3>
                        <p id="status-step1">自動轉換並下載製作與平台檔案</p>
                    </div>
                    <div class="drag-text center-drag">拖曳檔案至此或點擊上傳</div>
                    <input type="file" id="file-step1" accept=".xlsx, .xls" class="file-input" disabled>
                </section>
            </div>

            <!-- Right Column: Log Area (Green Border) -->
            <div class="column-right">
                <div class="log-container">
                    <div class="log-placeholder" id="log-placeholder">
                        <div style="text-align: center; color: #9ca3af;">
                            <div style="font-size: 3rem; margin-bottom: 1rem;">📄</div>
                            <h2 style="font-size: 1.5rem; font-weight: 500;">處理進度將顯示於此</h2>
                        </div>
                    </div>
                    <div class="log-area" id="log-step1"></div>
                    <div class="log-area" id="log-step2"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>

</html>
