<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPG 字典資料庫後台</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- SheetJS for Excel processing -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Jspreadsheet CE for in-browser Excel editor -->
    <script src="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4/dist/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsuites/dist/jsuites.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspreadsheet-ce/dist/jspreadsheet.min.css"
        type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsuites/dist/jsuites.min.css" type="text/css" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <!-- Shared Config -->
    <script src="js/firebase-config.js"></script>

    <style>
        body {
            padding: 0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .settings-header {
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            gap: 1.5rem;
            flex-shrink: 0;
        }

        .settings-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 2rem;
            background: var(--bg-color);
            overflow: hidden;
            gap: 1rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #4b5563;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #f3f4f6;
        }

        .action-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }

        .jexcel_container {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <header class="settings-header">
        <a href="index.html" class="back-btn">← 返回轉換工具</a>
        <div>
            <h2 style="font-size: 1.25rem; font-weight: 600; margin: 0; line-height: 1.2;">頻道字典資料庫</h2>
            <p style="font-size: 0.85rem; color: #6b7280; margin: 0;">與 Firebase Firestore 即時同步</p>
        </div>

        <div style="margin-left: auto;" class="action-bar">
            <span>正在編輯：</span>
            <select id="channel-settings-select" class="channel-dropdown"
                style="padding: 0.5rem; width: auto; font-size: 0.95rem; background: white; color: #374151; border: 2px solid #d1d5db;">
                <option value="">-- 請選擇頻道 --</option>
                <option value="ROCK_Entertainment">ROCK Entertainment</option>
            </select>
            <button id="btn-reset-dict" class="settings-btn"
                style="color: #ef4444; border-color: #fca5a5;">從原始檔重置</button>
            <button id="btn-save-settings" class="settings-btn"
                style="background: var(--blue-color); color: white; border-color: var(--blue-color);">儲存雲端字典</button>
        </div>
    </header>

    <main class="settings-content">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <p id="status-text" style="color: #4b5563; margin: 0; font-size: 0.95rem;">請先選擇頻道以載入字典。</p>
        </div>

        <div id="spreadsheet-container"
            style="flex: 1; overflow: hidden; background: white; border: 1px solid #d1d5db; border-radius: 8px; position: relative;">
            <!-- Jspreadsheet will render here -->
        </div>
    </main>

    <script src="js/settings.js"></script>
</body>

</html>
